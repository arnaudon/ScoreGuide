services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initializes the `mcp_readonly` role on first start (empty data volume).
      # For already-initialized prod volumes, run infrastructure/mcp-readonly.sql manually.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5


  mcp-postgres:
    image: crystaldba/postgres-mcp
    ports:
      - "8001:8001"
    command:
      - "--transport=sse"
      - "--sse-host=0.0.0.0"
      - "--sse-port=8001"
      - "--access-mode=restricted"
      # Defense-in-depth: connects as a SELECT-only role, so even a prompt
      # that escapes restricted mode can't write. Bootstrapped by
      # postgres-init/01_mcp_readonly.sql.
      - "postgresql://mcp_readonly:readonly@db:5432/${POSTGRES_DB}"
    restart: always

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend-svelte
      target: prod
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - BACKEND_URL=http://backend:8000
      - PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    env_file: .env


volumes:
  postgres_data:
