services:
  db:
    ports:
      - "5432:5432"
  backend:
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ./data:/app/data
    environment:
      - DATA_PATH=/app/data

  frontend:
    build:
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - ./frontend-svelte/ui:/app
      - /app/node_modules
      - ./shared:/app/shared
    environment:
      - BACKEND_URL=http://backend:8000
      - PUBLIC_BACKEND_URL=http://localhost:8000

volumes:
  postgres_data:
