name: Frontend (Svelte)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte/ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: frontend-svelte/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        # Also generates src/lib/paraglide/* via the paraglide vite plugin.
        run: npm run build

      - name: Unit tests (node project)
        # Fast, no browser. Playwright/browser project is intentionally skipped
        # until there's a real e2e suite to run.
        run: npx vitest run --project server

      - name: svelte-check
        # Informational until the pre-existing type/i18n errors are cleaned up.
        # Flip to strict (remove continue-on-error) in a follow-up.
        continue-on-error: true
        run: npm run check

      - name: Lint
        # Informational until prettier/eslint issues are cleaned up.
        continue-on-error: true
        run: npm run lint
