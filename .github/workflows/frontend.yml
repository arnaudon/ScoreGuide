name: Frontend (Svelte)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte/ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-svelte/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: svelte-check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Unit tests (node project)
        # Skip browser/playwright project in CI for now; gate on fast node tests.
        run: npx vitest run --project server

      - name: Production build
        run: npm run build
