name: Deploy to infomaniak

on:
  push:
    branches: [ main ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 2000 
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to Infomaniak via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euxo pipefail
            docker network inspect web >/dev/null 2>&1 || docker network create web
            cd /home/debian/ScoreGuide
            git pull origin main
            # Start fresh — all subsequent lines append.
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" > .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "MODEL=google-gla:gemini-2.5-flash-lite" >> .env
            echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env
            echo "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}" >> .env
            echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}" >> .env
            echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}" >> .env
            echo "S3_BUCKET=${{ secrets.S3_BUCKET }}" >> .env
            echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
            echo "PUBLIC_SENTRY_DSN=${{ secrets.PUBLIC_SENTRY_DSN }}" >> .env
            echo "SENTRY_ENVIRONMENT=production" >> .env
            echo "PUBLIC_SENTRY_ENVIRONMENT=production" >> .env
            docker-compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build -d
            # Show what's actually running so deploy logs are diagnosable.
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
            echo "--- frontend logs (tail 40) ---"
            docker logs --tail 40 frontend || true
            echo "--- backend logs (tail 40) ---"
            docker logs --tail 40 backend || true
            # Wait until Postgres is accepting connections before running psql/alembic.
            for _ in $(seq 30); do
              docker exec postgres_db pg_isready >/dev/null 2>&1 && break
              sleep 2
            done
            # Ensure the mcp_readonly role exists on the existing data volume.
            # Idempotent DO + IF NOT EXISTS block — safe to re-run every deploy.
            docker exec -i postgres_db sh -c 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB"' \
              < infrastructure/mcp-readonly.sql
            # run alembic migration
            docker exec --workdir /app/backend backend alembic upgrade head
