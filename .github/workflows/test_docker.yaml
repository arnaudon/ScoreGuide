name: Docker Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create empty .env file
        run: |
          touch .env
      - name: Build and Start Containers
        run: docker compose up -d --build --wait

      - name: Run Alembic migrations
        # Catches migration regressions before deploy: the initial revision
        # creates user/score/imslp/setting and the two incrementals apply on
        # top of a fresh volume.
        run: docker compose exec -T --workdir /app/backend backend alembic upgrade head

      - name: Run Backend Tests
        # Run from /app/backend so --cov=. and .coveragerc's source = app,tests
        # match the same tree they do when we run `pytest` locally from backend/.
        run: docker compose exec -T --workdir /app/backend backend pytest

      - name: Check Container Logs (If failed)
        if: failure()
        run: docker compose logs

      - name: Stop Containers
        if: always()
        run: docker compose down
