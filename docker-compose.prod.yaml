services:
  db:
    restart: always
    ports:
      - "5432:5432"

  backend:
    restart: always
    ports:
      - '8000:8000'

  frontend-streamlit:
    restart: always
    ports:
      - '8501:8501' # Streamlit default port
    environment:
      - API_URL=http://backend:8000
      - PUBLIC_API_URL=http://188.213.128.236:8000
    env_file: .env
    depends_on:
      - backend

  frontend:
    restart: always
    ports:
      - '80:3000'
    environment:
      - BACKEND_URL=http://backend:8000
      - PUBLIC_BACKEND_URL=http://188.213.128.236:8000
    env_file: .env


volumes:
  postgres_data:
